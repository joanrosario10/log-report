artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Parse a small Apache-style access log and emit summary statistics: total request count, distinct client IP count, and the most frequently requested path."
solution_explanation = "Read /app/access.log line by line; count every non-empty line as a request, collect the first whitespace field as the client IP, and parse the requested path out of the quoted request line. Write total_requests, unique_ips, and the most common path to /app/report.json as JSON."
verification_explanation = "Build report.json with the oracle, then assert the file exists, is valid JSON, and that total_requests, unique_ips, and top_path equal the values computed from the fixed access.log (6, 3, /index.html). The nop agent produces no report.json, so the existence check fails and reward is 0."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []
